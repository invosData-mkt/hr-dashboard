name: Sync Notion & Deploy

on:
  schedule:
    - cron: "0 2,8,14,20 * * *"   # 每 6 小時 (UTC 2,8,14,20 = 台北 10,16,22,04)
  workflow_dispatch:                # 手動觸發

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: pip install httpx

      - name: Fetch Notion data
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID: ${{ secrets.NOTION_DB_ID }}
        run: python scripts/generate_data.py

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install & Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Send failure notification
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "[HR Dashboard] ⚠ 同步失敗 - ${{ github.event.repository.updated_at }}"
          html_body: |
            <html><body style="font-family: Arial, sans-serif; color: #333;">
            <h2>HR Dashboard 同步失敗通知</h2>
            <p><strong>狀態：</strong>✗ 失敗</p>
            <p>請檢查 GitHub Actions：</p>
            <p><a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}">
              https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
            </a></p>
            </body></html>
          from: ${{ secrets.GMAIL_USER }}
          to: iriswei@ezprice.com.tw, sam.cheng@invos.com.tw
